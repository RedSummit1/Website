{{ define "main" }}
<article>
  <header>
    <h1>{{ .Title }}</h1>
    <p>
      {{ with .Params.repo }}
      <a href="{{ . }}" target="_blank" rel="noopener">[Repository]</a>
      {{ end }}
      <span class="post-date">{{ .Date.Format "2006" }}</span>
    </p>
    <hr>
  </header>
  {{ .Content }}
</article>
{{ end }}
