{{ define "main" }}
<h1>Projects</h1>
<div class="project-grid">
  {{ range .RegularPages.ByDate.Reverse }}
  <a class="project-card" href="{{ .RelPermalink }}">
    <h3>{{ .Title }}</h3>
    <p>{{ .Params.summary }}</p>
    <small>{{ .Date.Format "2006" }}</small>
  </a>
  {{ end }}
</div>
{{ end }}
